<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サンプルページ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 15px;
            text-align: center;
        }
        nav {
            background-color: #555;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            padding: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <h1>ようこそ！</h1>
    <p>これはサンプルのWebページです</p>
</header>

<nav>
    <a href="https://www.google.com">グーグル</a>
    <a href="#">サービス</a>
    <a href="#">お問い合わせ</a>
</nav>

<main>
    <div class="card">
        <h2>セクション1</h2>
        <p>ここに内容を書きます。</p>
    </div>

    <div class="card">
        <h2>セクション2</h2>
        <p>さらに情報を追加できます。</p>
    </div>
</main>
</html>
